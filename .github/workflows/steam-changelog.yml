name: Generate Steam Changelog

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Steam BBCode changelog
        id: changelog
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          DATE=$(date -u +"%B %-d, %Y")

          # Determine commit range: since last tag, or all commits
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # Collect commits (hash + full subject)
          COMMITS=$(git log "$RANGE" --pretty=format:"%H %s" --no-merges)

          if [ -z "$COMMITS" ]; then
            echo "No commits found in range."
            echo "[h1]Update - ${DATE}[/h1]" > steam-changelog.bbcode
            echo "No changes." >> steam-changelog.bbcode
            exit 0
          fi

          # Temp files for each category
          FIXES=$(mktemp)
          FEATS=$(mktemp)
          OTHER=$(mktemp)

          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            SHORT=$(echo "$HASH" | cut -c1-7)
            MSG=$(echo "$line" | cut -d' ' -f2-)
            LINK="[url=${REPO_URL}/commit/${HASH}]${SHORT}[/url]"

            # Strip conventional-commit prefix (e.g. "fix: ", "feat!: ")
            if echo "$MSG" | grep -qiE "^fix(\(.+\))?!?:\s*"; then
              CLEAN=$(echo "$MSG" | sed -E 's/^fix(\(.+\))?!?:\s*//i')
              echo "[*] ${CLEAN} (${LINK})" >> "$FIXES"
            elif echo "$MSG" | grep -qiE "^feat(\(.+\))?!?:\s*"; then
              CLEAN=$(echo "$MSG" | sed -E 's/^feat(\(.+\))?!?:\s*//i')
              echo "[*] ${CLEAN} (${LINK})" >> "$FEATS"
            else
              # Strip any other conventional prefix for readability
              CLEAN=$(echo "$MSG" | sed -E 's/^[a-zA-Z]+(\(.+\))?!?:\s*//')
              echo "[*] ${CLEAN} (${LINK})" >> "$OTHER"
            fi
          done <<< "$COMMITS"

          # Build BBCode output
          {
            echo "[h1]Update - ${DATE}[/h1]"
            echo ""

            if [ -s "$FEATS" ]; then
              echo "[h2]New Features[/h2]"
              echo "[list]"
              cat "$FEATS"
              echo "[/list]"
              echo ""
            fi

            if [ -s "$FIXES" ]; then
              echo "[h2]Bug Fixes[/h2]"
              echo "[list]"
              cat "$FIXES"
              echo "[/list]"
              echo ""
            fi

            if [ -s "$OTHER" ]; then
              echo "[h2]Other Changes[/h2]"
              echo "[list]"
              cat "$OTHER"
              echo "[/list]"
              echo ""
            fi
          } > steam-changelog.bbcode

          rm -f "$FIXES" "$FEATS" "$OTHER"

          echo "--- Generated Changelog ---"
          cat steam-changelog.bbcode

      - name: Show in job summary
        run: |
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat steam-changelog.bbcode >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-changelog
          path: steam-changelog.bbcode