name: Auto Version Bump

on:
  push:
    branches: [master]
    paths:
      - 'lua/**'

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VERSION_BUMP }}

      - name: Generate version string
        id: version
        run: |
          DATE_PART=$(date -u +"%Y.%-m.%-d")
          BUILD_NUM=${{ github.run_number }}
          VERSION="${DATE_PART}.${BUILD_NUM}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Generated version: $VERSION"

      - name: Update version.lua
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/local CURRENT_VERSION = \"[^\"]*\"/local CURRENT_VERSION = \"${VERSION}\"/" lua/mediaplayer/version.lua
          echo "Updated version.lua to $VERSION"
          cat lua/mediaplayer/version.lua | head -20

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lua/mediaplayer/version.lua
          if git diff --cached --quiet; then
            echo "No version change needed"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
            git push
          fi