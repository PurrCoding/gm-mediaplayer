<!doctype html>
<html lang="en">

<head>
	<!-- 👋👋👋 Hello dear code reader, have fun understanding how YT works without ads. -->
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>YT Minimal Player (Metadata)</title>

	<link rel="dns-prefetch" href="//www.youtube.com">
	<link rel="preconnect" href="https://www.youtube.com" crossorigin>

	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 1px;
			height: 1px;
			overflow: hidden;
		}
	</style>
</head>

<body>
	<script>
		'use strict';

		// Get parameter from hash first, then fall back to query parameters
		function getParameter(name) {
			const hash = window.location.hash.substring(1);
			if (hash) {
				const hashParams = new URLSearchParams(hash);
				const hashValue = hashParams.get(name);
				if (hashValue) return hashValue;
			}

			const urlParams = new URLSearchParams(window.location.search);
			if (urlParams.get(name)) return urlParams.get(name);

			return null;
		}

		async function fetchMetadata(videoId) {
			const response = await fetch('https://www.youtube.com/youtubei/v1/player', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
				},
				body: JSON.stringify({
					videoId: videoId,
					context: {
						client: {
							clientName: 'WEB',
							clientVersion: '2.20210721.00.00'
						}
					}
				})
			});

			if (!response.ok) {
				console.log('ERROR:InnerTube request failed with HTTP ' + response.status);
				return;
			}

			const data = await response.json();
			const details = data.videoDetails;

			if (!details) {
				const reason = (data.playabilityStatus && data.playabilityStatus.reason) || 'Unknown reason';
				console.log('ERROR:' + reason);
				return;
			}

			const isLive = details.isLiveContent === true;
			const duration = isLive ? 0 : (parseInt(details.lengthSeconds, 10) || 0);

			const metadata = {
				title: details.title || '',
				isLive: isLive,
				duration: duration
			};

			console.log('METADATA:' + JSON.stringify(metadata));
		}

		document.addEventListener('DOMContentLoaded', function() {
			const videoId = getParameter('v');

			if (!videoId) {
				console.log('ERROR:No video ID provided');
				return;
			}

			fetchMetadata(videoId).catch(function(err) {
				console.log('ERROR:' + err.message);
			});
		});
	</script>
</body>

</html>
