<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background -->
  
  <!-- Stop sign shape -->
  <polygon points="156,20 356,20 492,156 492,356 356,492 156,492 20,356 20,156"
           fill="#d60000" stroke="white" stroke-width="12"/>

  <!-- STOP text -->
  <text x="50%" y="38%" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="110" font-weight="bold"
        fill="white">STOP</text>

  <!-- Divider line -->
  <line x1="80" y1="230" x2="432" y2="230"
        stroke="white" stroke-width="6"/>

  <!-- Smaller text -->
  <text x="50%" y="300" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="40" font-weight="bold"
        fill="white">PLEASE READ</text>

  <text x="50%" y="350" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="40" font-weight="bold"
        fill="white">BEFORE YOU</text>

  <text x="50%" y="400" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="40" font-weight="bold"
        fill="white">COMMENT</text>
</svg>