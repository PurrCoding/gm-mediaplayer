<!doctype html>
<html lang="en">

<head>
	<!-- 👋👋👋 Hello dear code reader, have fun understanding how YT works without ads. -->
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>YT Minimal Player (Metadata)</title>

	<link rel="dns-prefetch" href="//www.youtube.com">
	<link rel="dns-prefetch" href="//www.youtube-nocookie.com">
	<link rel="dns-prefetch" href="//i.ytimg.com">
	<link rel="preconnect" href="https://www.youtube.com" crossorigin>
	<link rel="preconnect" href="https://www.youtube-nocookie.com" crossorigin>
	<link rel="preload" href="https://www.youtube.com/iframe_api" as="script">

	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 1px;
			height: 1px;
			overflow: hidden;
		}

		#player-container {
			width: 1px;
			height: 1px;
			position: fixed;
			top: 0;
			left: 0;
		}
	</style>
</head>

<body>
	<div id="player-container"></div>

	<script>
		// ─── Debug helpers ────────────────────────────────────────────────────────

		const PAGE_START = performance.now();

		// Human-readable names for YT player state codes
		const STATE_NAMES = {
			"-1": "UNSTARTED",
			"0":  "ENDED",
			"1":  "PLAYING",
			"2":  "PAUSED",
			"3":  "BUFFERING",
			"5":  "CUED"
		};

		/**
		 * Emit a debug line that the Lua ConsoleMessage handler will forward
		 * to the GMod console. The [YT-META] prefix is intentional — Lua strips
		 * "DEBUG:" and prints the rest verbatim.
		 * @param {string} msg
		 */
		function dbg(msg) {
			const elapsed = (performance.now() - PAGE_START).toFixed(1);
			console.log("DEBUG:[YT-META] [+" + elapsed + "ms] " + msg);
		}

		function stateName(code) {
			return (STATE_NAMES[String(code)] || "UNKNOWN") + "(" + code + ")";
		}

		// ─── URL parameter helpers ────────────────────────────────────────────────

		// Get parameter from hash first, then fall back to query parameters
		function getParameter(name) {
			// Try hash parameters first
			const hash = window.location.hash.substring(1); // Remove '#'
			if (hash) {
				const hashParams = new URLSearchParams(hash);
				const hashValue = hashParams.get(name);
				if (hashValue) return hashValue;
			}

			// Fall back to query parameters for backwards compatibility
			const urlParams = new URLSearchParams(window.location.search);
			if (urlParams.get(name)) return urlParams.get(name);

			return null;
		}

		function getUrlParameter(name) {
			const urlParams = new URLSearchParams(window.location.search);
			if (urlParams.get(name)) return urlParams.get(name);

			return null;
		}

		// ─── IFrame API bootstrap ─────────────────────────────────────────────────

		dbg("Page loaded. URL: " + window.location.href);
		dbg("Hash: '" + window.location.hash + "' | Search: '" + window.location.search + "'");
		dbg("Injecting IFrame API script from https://www.youtube.com/iframe_api ...");

		const tag = document.createElement('script');
		tag.src = "https://www.youtube.com/iframe_api";
		tag.onload = function() {
			dbg("IFrame API script loaded successfully.");
		};
		tag.onerror = function() {
			dbg("ERROR: IFrame API script failed to load — network issue or YouTube blocked.");
			console.log("ERROR:Failed to load YouTube IFrame API");
		};
		document.head.appendChild(tag);

		// ─── Player state ─────────────────────────────────────────────────────────

		let player = null;

		// Guards so extractAndSend() only fires once per createPlayer() call
		let metadataExtracted = false;
		let safetyTimeout     = null;

		const defaultPlayerVars = {
			controls: 0,       // Hide native controls
			rel: 0,            // Disable related videos
			loop: 0,           // No loop
			disablekb: 1,      // Disable keyboard shortcuts
			enablejsapi: 1,    // Enable JS API for custom controls
			muted: 1,          // Set to play muted
			cc_load_policy: 0, // Do not display subtitles automatically
			iv_load_policy: 3, // Do not display video annotations
			autoplay: 1        // Set to make it autostart
		};

		// ─── Metadata extraction ──────────────────────────────────────────────────

		/**
		 * Read metadata from the player and emit it exactly once.
		 * Called either by onStateChange (fast path) or the 8s safety-net timeout.
		 * @param {string} trigger  Human-readable label for what triggered this call.
		 */
		function extractAndSend(trigger) {
			if (metadataExtracted) {
				dbg("extractAndSend() called again by '" + trigger + "' — already fired, ignoring.");
				return;
			}
			metadataExtracted = true;

			dbg("--- extractAndSend() triggered by: " + trigger + " ---");

			if (safetyTimeout) {
				clearTimeout(safetyTimeout);
				safetyTimeout = null;
				dbg("Safety timeout cancelled.");
			}

			// ── Raw player readings ──
			const videoData   = player.getVideoData();
			const playerState = player.getPlayerState();
			const duration    = player.getDuration();
			const volume      = player.getVolume();
			const isMuted     = player.isMuted();
			const playbackRate = player.getPlaybackRate();
			const availableQuality = player.getAvailableQualityLevels
				? player.getAvailableQualityLevels()
				: [];

			dbg("Player state   : " + stateName(playerState));
			dbg("Volume / Muted : " + volume + " / " + isMuted);
			dbg("Playback rate  : " + playbackRate + "x");
			dbg("Duration       : " + duration + "s (raw, before Math.round)");
			dbg("Quality levels : " + (availableQuality.length ? availableQuality.join(", ") : "(none yet)"));

			// ── Full videoData dump ──
			dbg("videoData dump : " + JSON.stringify(videoData));
			dbg("  title        : '" + videoData.title + "'" +
				((!videoData.title || videoData.title === "") ? " ⚠ EMPTY — server HTML fallback will trigger" : ""));
			dbg("  video_id     : '" + videoData.video_id + "'");
			dbg("  author       : '" + videoData.author + "'");
			dbg("  isLive       : " + videoData.isLive);
			dbg("  errorCode    : " + (videoData.errorCode || "none"));

			// ── Duration sanity checks ──
			if (isNaN(duration)) {
				dbg("  duration     : NaN ⚠ — will become null in JSON, server may crash on math.Round(nil)");
			} else if (duration === 0) {
				dbg("  duration     : 0 ⚠ — video may not have buffered yet, or this is a live stream");
			} else {
				dbg("  duration     : " + duration + "s ✓");
			}

			// ── Playability resolution ──
			const isPlayable = playerState === YT.PlayerState.PLAYING ||
							   playerState === YT.PlayerState.BUFFERING ||
							   playerState === YT.PlayerState.CUED;
			const isLive        = isPlayable && !!videoData.isLive;
			const isNormalVideo = isPlayable && duration > 0 && !videoData.isLive;

			dbg("isPlayable     : " + isPlayable);
			dbg("isLive         : " + isLive);
			dbg("isNormalVideo  : " + isNormalVideo);

			if (!isPlayable) {
				dbg("⚠ Player is NOT in a playable state — metadata may be incomplete.");
			}

			// Pause the video after metadata extraction
			player.pauseVideo();
			dbg("pauseVideo() called.");

			// ── Build and emit metadata ──
			const metadata = {
				title:    videoData.title,
				isLive:   isLive,
				duration: Math.round(duration),
				debug: {
					playerState: playerState,
					videoType:   isLive ? "live" : (isNormalVideo ? "normal" : "unknown"),
					videoData:   videoData
				}
			};

			dbg("Emitting METADATA: " + JSON.stringify(metadata));
			dbg("--- extractAndSend() done ---");
			console.log("METADATA:" + JSON.stringify(metadata));
		}

		// ─── API ready / player creation ──────────────────────────────────────────

		function onYouTubeIframeAPIReady() {
			dbg("onYouTubeIframeAPIReady() fired — IFrame API is fully initialised.");

			const rawVid = getParameter('v');
			dbg("Raw 'v' parameter from URL: '" + rawVid + "'");

			const vid = (rawVid && /^[a-zA-Z0-9_-]{11}$/.test(rawVid))
				? rawVid
				: 'dQw4w9WgXcQ';

			if (vid !== rawVid) {
				dbg("⚠ Video ID '" + rawVid + "' failed validation — falling back to default ID '" + vid + "'");
			} else {
				dbg("Video ID validated: '" + vid + "'");
			}

			createPlayer(vid);
		}

		function createPlayer(videoId) {
			dbg("createPlayer() called for videoId='" + videoId + "'");

			// Reset per-call state so re-use of the page works correctly
			metadataExtracted = false;
			if (safetyTimeout) {
				clearTimeout(safetyTimeout);
				safetyTimeout = null;
				dbg("Cleared leftover safety timeout from previous createPlayer() call.");
			}

			if (player && typeof player.destroy === 'function') {
				dbg("Destroying existing player instance before creating a new one.");
				player.destroy();
				player = null;
				document.getElementById('player-container').innerHTML = '';
			}

			dbg("Creating YT.Player with host=https://www.youtube-nocookie.com, playerVars=" + JSON.stringify(defaultPlayerVars));

			player = new YT.Player('player-container', {
				height: '100%',
				width: '100%',
				videoId: videoId,
				playerVars: defaultPlayerVars,
				host: 'https://www.youtube-nocookie.com',
				events: {
					onReady: () => {
						dbg("onReady fired — player is ready. Calling playVideo() + setVolume(0).");
						player.playVideo();
						player.setVolume(0);

						// Safety net: fire regardless if onStateChange never
						// reaches BUFFERING/PLAYING within 8 seconds.
						// Chosen to stay safely under the 10s DHTMLPrefetch
						// timeout on the Lua side.
						dbg("Arming 8s safety-net timeout (Lua DHTMLPrefetch limit is 10s).");
						safetyTimeout = setTimeout(() => {
							dbg("⚠ Safety timeout fired — onStateChange never reached BUFFERING/PLAYING in 8s.");
							dbg("  Current player state: " + stateName(player.getPlayerState()));
							dbg("  This usually means slow network, YouTube throttling, or a bot-challenge response.");
							extractAndSend("safety-timeout-8s");
						}, 8000);
					},

					onStateChange: (event) => {
						const state = event.data;
						dbg("onStateChange: " + stateName(state));

						// BUFFERING fires as soon as YouTube starts loading the
						// stream — at that point getVideoData().title and
						// getDuration() are reliably populated.
						// PLAYING is a secondary trigger for cases where
						// BUFFERING is skipped (e.g. cached/instant start).
						if (state === YT.PlayerState.BUFFERING ||
							state === YT.PlayerState.PLAYING) {
							dbg("Playable state reached (" + stateName(state) + "). Scheduling extractAndSend in 100ms to let getVideoData() settle.");
							setTimeout(() => extractAndSend("onStateChange-" + stateName(state)), 100);
						} else if (state === YT.PlayerState.UNSTARTED) {
							dbg("  Player is UNSTARTED — waiting for buffering to begin.");
						} else if (state === YT.PlayerState.ENDED) {
							dbg("  ⚠ Player reached ENDED state before metadata was extracted.");
						} else if (state === YT.PlayerState.PAUSED) {
							dbg("  Player paused (expected after extractAndSend calls pauseVideo).");
						}
					},

					onError: (event) => {
						const YT_ERROR_CODES = {
							2:   "Invalid parameter value (e.g. wrong video ID format).",
							5:   "HTML5 player error – the requested content cannot be played in this player.",
							100: "Video not found. It may have been removed, set to private, or the ID is invalid.",
							101: "The owner of the video has prohibited embedding on this site.",
							150: "This content can't be requested. Logging in won't solve this — no workaround exists. Don't sign in to YouTube." // Same as 101
						};

						const msg = YT_ERROR_CODES[event.data] || ("Unknown error code: " + event.data);
						dbg("onError fired: code=" + event.data + " — " + msg);
						console.log("ERROR:" + msg);
					}
				}
			});

			dbg("YT.Player constructor returned — waiting for onReady callback.");
		}

		// ─── Edge case: API already loaded before this script ran ─────────────────

		if (window.YT && window.YT.Player && !player) {
			dbg("window.YT already exists — IFrame API was loaded before this script. Calling onYouTubeIframeAPIReady() directly.");
			if (document.readyState === 'complete') {
				onYouTubeIframeAPIReady();
			} else {
				dbg("Document not yet complete — deferring to 'load' event.");
				window.addEventListener('load', onYouTubeIframeAPIReady);
			}
		}

	</script>
</body>

</html>
