<!doctype html>
<html lang="en">

<head>
	<!-- 👋👋👋 Hello dear code reader, have fun understanding how YT works without ads. -->
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>YT Minimal Player (Metadata)</title>

	<link rel="dns-prefetch" href="//www.youtube.com">
	<link rel="dns-prefetch" href="//www.youtube-nocookie.com">
	<link rel="dns-prefetch" href="//i.ytimg.com">
	<link rel="preconnect" href="https://www.youtube.com" crossorigin>
	<link rel="preconnect" href="https://www.youtube-nocookie.com" crossorigin>
	<link rel="preload" href="https://www.youtube.com/iframe_api" as="script">

	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 1px;
			height: 1px;
			overflow: hidden;
		}

		#player-container {
			width: 1px;
			height: 1px;
			position: fixed;
			top: 0;
			left: 0;
		}
	</style>
</head>

<body>
	<div id="player-container"></div>

	<script>
		// ============================================================================
		// CONFIGURATION
		// ============================================================================
		const CONFIG = {
			API_URL: "https://www.youtube.com/iframe_api",
			PLAYER_HOST: "https://www.youtube-nocookie.com",
			DEFAULT_VIDEO_ID: "dQw4w9WgXcQ",
			POLLING_INTERVAL_MS: 100,
			MAX_POLLING_ATTEMPTS: 20,
			METADATA_EXTRACTION_DELAY_MS: 100,
			PLAYER_VARS: {
				controls: 0,
				rel: 0,
				loop: 0,
				disablekb: 1,
				enablejsapi: 1,
				muted: 1,
				cc_load_policy: 0,
				iv_load_policy: 3,
				autoplay: 1,
				playsinline: 1,
				modestbranding: 1,
				showinfo: 0
			},
			ERROR_CODES: {
				2: "Invalid parameter value (e.g. wrong video ID format).",
				5: "HTML5 player error – the requested content cannot be played in this player.",
				100: "Video not found. It may have been removed, set to private, or the ID is invalid.",
				101: "The owner of the video has prohibited embedding on this site.",
				150: "Video is age-restricted or unplayable for unknown reasons."
			}
		};

		// ============================================================================
		// UTILITY FUNCTIONS
		// ============================================================================
		const Utils = {
			getParameter(name) {
				const hash = window.location.hash.substring(1);
				if (hash) {
					const hashParams = new URLSearchParams(hash);
					const hashValue = hashParams.get(name);
					if (hashValue) return hashValue;
				}

				const urlParams = new URLSearchParams(window.location.search);
				return urlParams.get(name) || null;
			},

			getUrlParameter(name) {
				const urlParams = new URLSearchParams(window.location.search);
				return urlParams.get(name) || null;
			},

			sleep(ms) {
				return new Promise(resolve => setTimeout(resolve, ms));
			},

			logError(message) {
				console.log(`ERROR:${message}`);
			},

			logMetadata(metadata) {
				console.log(`METADATA:${JSON.stringify(metadata)}`);
			}
		};

		// ============================================================================
		// YOUTUBE API LOADER
		// ============================================================================
		class YouTubeAPILoader {
			static load() {
				return new Promise((resolve, reject) => {
					if (window.YT && window.YT.Player) {
						resolve(window.YT);
						return;
					}

					const script = document.createElement('script');
					script.src = CONFIG.API_URL;
					script.onload = () => resolve(window.YT);
					script.onerror = () => reject(new Error("Failed to load YouTube IFrame API"));
					document.head.appendChild(script);
				});
			}
		}

		// ============================================================================
		// METADATA EXTRACTOR
		// ============================================================================
		class MetadataExtractor {
			constructor(player) {
				this.player = player;
				this.extracted = false;
			}

			async extract() {
				if (this.extracted || !this.player) return null;
				this.extracted = true;

				const videoData = this.player.getVideoData();
				const playerState = this.player.getPlayerState();
				const duration = this.player.getDuration();

				const isPlayable = playerState === YT.PlayerState.PLAYING ||
								playerState === YT.PlayerState.BUFFERING ||
								playerState === YT.PlayerState.CUED;

				const isLive = isPlayable && videoData.isLive;
				const isNormalVideo = isPlayable && duration > 0 && !videoData.isLive;

				this.player.pauseVideo();

				const metadata = {
					title: videoData.title,
					isLive: isLive,
					duration: Math.round(duration),
					debug: {
						playerState: playerState,
						videoType: isLive ? "live" : (isNormalVideo ? "normal" : "unknown"),
						videoData: videoData
					}
				};

				Utils.logMetadata(metadata);
				return metadata;
			}

			async extractWithPolling() {
				for (let i = 0; i < CONFIG.MAX_POLLING_ATTEMPTS; i++) {
					if (this.extracted) return await this.extract();

					await Utils.sleep(CONFIG.POLLING_INTERVAL_MS);

					const videoData = this.player.getVideoData();
					if (videoData.title && this.player.getDuration() > 0) {
						return await this.extract();
					}
				}

				return await this.extract();
			}

			hasRequiredData() {
				const videoData = this.player.getVideoData();
				return !!(videoData.title && this.player.getDuration() > 0);
			}
		}

		// ============================================================================
		// YOUTUBE PLAYER MANAGER
		// ============================================================================
		class YouTubePlayerManager {
			constructor(containerId) {
				this.containerId = containerId;
				this.player = null;
				this.extractor = null;
			}

			async createPlayer(videoId) {
				this.destroy();

				return new Promise((resolve, reject) => {
					this.player = new YT.Player(this.containerId, {
						height: '100%',
						width: '100%',
						videoId: videoId,
						playerVars: CONFIG.PLAYER_VARS,
						host: CONFIG.PLAYER_HOST,
						events: {
							onReady: () => {
								this.player.playVideo();
								this.player.setVolume(0);
								resolve(this.player);
							},
							onError: (event) => {
								const errorMessage = CONFIG.ERROR_CODES[event.data] || `Unknown error: ${event.data}`;
								reject(new Error(errorMessage));
							}
						}
					});
				});
			}

			async waitForPlayingState() {
				return new Promise((resolve) => {
					if (this.extractor && this.extractor.extracted) {
						resolve();
						return;
					}

				 const stateChangeHandler = (event) => {
						if (event.data === YT.PlayerState.PLAYING) {
							this.player.removeEventListener('onStateChange', stateChangeHandler);
							resolve();
						}
					};

					this.player.addEventListener('onStateChange', stateChangeHandler);
				});
			}

			destroy() {
				if (this.player && typeof this.player.destroy === 'function') {
					this.player.destroy();
					this.player = null;
					document.getElementById(this.containerId).innerHTML = '';
				}
				this.extractor = null;
			}

			setExtractor(extractor) {
				this.extractor = extractor;
			}
		}

		// ============================================================================
		// METADATA SERVICE
		// ============================================================================
		class MetadataService {
			constructor() {
				this.playerManager = new YouTubePlayerManager('player-container');
			}

			async getMetadata(videoId) {
				try {
					await this.playerManager.createPlayer(videoId);
					const extractor = new MetadataExtractor(this.playerManager.player);
					this.playerManager.setExtractor(extractor);

					// Race between event-driven and polling approaches
					const eventDrivenPromise = this._eventDrivenExtraction(extractor);
					const pollingPromise = extractor.extractWithPolling();

					await Promise.race([eventDrivenPromise, pollingPromise]);

				} catch (error) {
					Utils.logError(error.message);
				}
			}

			async _eventDrivenExtraction(extractor) {
				await this.playerManager.waitForPlayingState();
				await Utils.sleep(CONFIG.METADATA_EXTRACTION_DELAY_MS);
				return await extractor.extract();
			}
		}

		// ============================================================================
		// APPLICATION INITIALIZATION
		// ============================================================================
		class Application {
			constructor() {
				this.metadataService = new MetadataService();
			}

			async initialize() {
				try {
					await YouTubeAPILoader.load();
					const videoId = Utils.getParameter('v') || CONFIG.DEFAULT_VIDEO_ID;
					await this.metadataService.getMetadata(videoId);
				} catch (error) {
					Utils.logError(error.message);
				}
			}

			static handleEdgeCase() {
				if (window.YT && window.YT.Player) {
					const app = new Application();
					if (document.readyState === 'complete') {
						app.initialize();
					} else {
						window.addEventListener('load', () => app.initialize());
					}
				}
			}
		}

		// ============================================================================
		// GLOBAL API CALLBACK
		// ============================================================================
		function onYouTubeIframeAPIReady() {
			const app = new Application();
			app.initialize();
		}

		// ============================================================================
		// HANDLE EDGE CASE: API ALREADY LOADED
		// ============================================================================
		Application.handleEdgeCase();

	</script>
</body>

</html>
